services:
  db:
    image: postgres:16-alpine
    container_name: lotpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lotpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lotpilot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - lotpilot-postgres-data:/var/lib/postgresql/data

volumes:
  lotpilot-postgres-data:
